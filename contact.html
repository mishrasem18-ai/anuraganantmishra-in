  <section class="banner fade" style="background: linear-gradient(135deg, #000 60%, #3e2a00 100%);">
    <div class="banner-content">
      <h1>Contact</h1>
    </div>
  </section>

  <section class="contact-section fade">
    <div class="container">
      <p>For focused conversations about AI, MarTech architecture, analytics automation or personalization systems.</p>

      <form id="contactForm">
        <label class="sr-only" for="name">Your Name</label>
        <input type="text" id="name" name="name" placeholder="Your Name" autocomplete="name" required />
        <label class="sr-only" for="email">Your Email</label>
        <input type="email" id="email" name="email" placeholder="Your Email" autocomplete="email" required />
        <label class="sr-only" for="message">Your Message</label>
        <textarea id="message" name="message" placeholder="Your Message" required></textarea>
        <button type="submit">Send Message</button>
        <p id="formStatus" aria-live="polite"></p>
      </form>
    </div>
  </section>

  <footer>
    <p>© 2026 Anurag Anant Mishra | All Rights Reserved</p>
  </footer>

  <script>
    const toggle = document.querySelector('.menu-toggle');
    const navList = document.querySelector('nav ul');
    if (toggle && navList) {
      toggle.addEventListener('click', () => {
        const isOpen = navList.classList.toggle('open');
        toggle.setAttribute('aria-expanded', String(isOpen));
      });
    }

    if ('IntersectionObserver' in window) {
      const observer = new IntersectionObserver(e => e.forEach(x => {
        if (x.isIntersecting) {
          x.target.classList.add('visible');
          observer.unobserve(x.target);
        }
      }), { threshold: 0.2 });
      document.querySelectorAll('.fade').forEach(el => observer.observe(el));
    } else {
      document.querySelectorAll('.fade').forEach(el => el.classList.add('visible'));
    }

    const scriptURL = "https://script.google.com/macros/s/AKfycbx89y0xIx5nHW7Dtc2NnVh3tavTkCF9_63nrGDBLyvWlday5xYZSPBc6YFiQCnvQ5D9/exec";
    const form = document.getElementById("contactForm");
    const statusText = document.getElementById("formStatus");

    function showStatus(msg, color) {
      statusText.textContent = msg;
      statusText.style.color = color;
    }

    form.addEventListener("submit", async e => {
      e.preventDefault();
      if (!form.checkValidity()) {
        showStatus("Please fill all fields correctly.", "orange");
        return;
      }
      const data = new URLSearchParams({
        name: form.name.value.trim(),
        email: form.email.value.trim(),
        message: form.message.value.trim()
      });
      showStatus("Sending...", "#d4af37");
      try {
        await fetch(scriptURL, { method: "POST", mode: "no-cors", body: data });
        showStatus("Thank you. Your message has been sent successfully.", "lightgreen");
        form.reset();
      } catch (err) {
        showStatus("Error sending message. Please try again.", "red");
      }
    });
  </script>
